<!DOCTYPE html>
<html>
<head>
<style>
  body { background: #111; display: flex; justify-content: center; padding: 50px; }
  .wrapper {
    width: 350px;
    height: 580px;
    border-radius: 24px;
    overflow: hidden;
    position: relative;
    background: #000;
  }
  .wrapper iframe {
    position: absolute;
    top: -54px; /* hide header */
    left: -2px; /* hide left border if any */
    width: calc(100% + 4px);
    height: calc(100% + 140px); /* hide footer */
    border: 0;
  }
</style>
</head>
<body>
  <div class="wrapper">
    <iframe src="https://www.instagram.com/reel/DE-R6IttzVb/embed/" scrolling="no"></iframe>
  </div>
</body>
</html>
